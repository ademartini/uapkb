services:
  db:
    image: postgres:16.8
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: uapkb
      POSTGRES_PASSWORD: uapkb
      POSTGRES_DB: uapkb
    volumes:
      - uapkb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uapkb -d uapkb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uapkb-postgres-data:
