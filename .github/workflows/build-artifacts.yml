name: build-artifacts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  production-image:
    name: Production Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@e468f50481deecd88f693797f6afed40781d3274 # v3.11.1
      - uses: docker/build-push-action@14487c292dc2b3f778baed4c0e421c0e62025c9a # v6.18.0
        with:
          context: .
          push: false
          tags: uapkb:ci
          build-args: NODE_VERSION=22

  node-parity:
    name: Node version parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: ./scripts/check-node-parity.sh
