name: build-artifacts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  production-image:
    name: Production Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: false
          tags: uapkb:ci

  node-parity:
    name: Node version parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: ./scripts/check-node-parity.sh

  cloud-agent-environment:
    name: Cursor Cloud Agent environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build Cloud Agent image without secrets
        run: docker build -t uapkb-cloud-agent:ci -f .cursor/Dockerfile .cursor
      - name: Verify Cloud Agent image tools
        run: |
          expected_node="$(tr -d '[:space:]' < .nvmrc)"
          expected_pnpm="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          docker run --rm \
            -e EXPECTED_NODE="$expected_node" \
            -e EXPECTED_PNPM="$expected_pnpm" \
            uapkb-cloud-agent:ci \
            sh -lc 'case "$(node --version)" in "v${EXPECTED_NODE}".*) ;; *) node --version; exit 1;; esac && test "$(pnpm --version)" = "$EXPECTED_PNPM" && git --version && sudo -V'
